name: Deploy Booking API

on:
  push:
    branches:
      - uat-booking-api
      - production-booking-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root              # ✅ hardcoded (important)
        port: 22                    # ✅ expliitly set
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        debug: true                 # ✅ must-have
        script: |
          whoami
          root
          hostname
          srv1118630

          if [ "${{ github.ref_name }}" = "uat-booking-api" ]; then
            cd /var/www/booking-api/uat/booking-api
            git pull origin uat-booking-api
            npm install
            pm2 restart booking-api-uat
          fi

    - name: Check secrets presence (safe)
      run: |
        if [ -z "${{ secrets.SERVER_IP }}" ]; then
          echo "SERVER_IP is missing"
          exit 1
        else
          echo "SERVER_IP is present"
        fi
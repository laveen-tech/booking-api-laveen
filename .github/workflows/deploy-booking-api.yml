name: Deploy Booking API

on:
  push:
    branches:
      - uat-booking-api
      - production-booking-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        port: 22
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        debug: true
        script: |
          whoami
          hostname

          export GIT_SSH_COMMAND="ssh -i /root/.ssh/booking_api_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"

          if [ "${{ github.ref_name }}" = "uat-booking-api" ]; then
            cd /var/www/booking-api/uat/booking-api
            git pull origin uat-booking-api
            npm install
            pm2 restart booking-api-uat
          fi

          if [ "${{ github.ref_name }}" = "production-booking-api" ]; then
            cd /var/www/booking-api/production/booking-api
            git pull origin production-booking-api
            npm install
            pm2 restart booking-api-production
          fi
